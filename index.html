<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡承翰 🍔</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&family=Fredoka:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bun-top: #F4A460;
            --bun-bottom: #D2691E;
            --lettuce: #32CD32;
            --tomato: #FF6347;
            --cheese: #FFD700;
            --patty: #8B4513;
            --sesame: #FFFACD;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #FFE4B5 0%, #FFDAB9 50%, #FFE4C4 100%);
            overflow-x: hidden;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .burger-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .burger {
            position: absolute;
            font-size: 2rem;
            animation: fall linear infinite;
            cursor: default;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            user-select: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(calc(100vh + 100px)) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(-5deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-1deg); }
            75% { transform: translateX(5px) rotate(1deg); }
        }

        .center-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
        }

        .name-card {
            background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
            padding: 40px 80px;
            border-radius: 30px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.3),
                0 0 0 8px var(--cheese),
                0 0 0 16px var(--tomato),
                0 0 0 24px var(--lettuce),
                inset 0 -5px 20px rgba(0,0,0,0.1);
            animation: float 3s ease-in-out infinite, pulse 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .name-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255,255,255,0.3) 50%,
                transparent 70%
            );
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .name {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--patty) 0%, var(--bun-bottom) 50%, var(--tomato) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
            letter-spacing: 0.1em;
        }

        .subtitle {
            font-family: 'Fredoka', cursive;
            font-size: 1.5rem;
            color: var(--patty);
            margin-top: 15px;
            opacity: 0.8;
        }

        .mega-burger {
            font-size: 8rem;
            position: absolute;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .mega-burger:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
        .mega-burger:nth-child(2) { top: 10%; right: 8%; animation-delay: 0.5s; }
        .mega-burger:nth-child(3) { bottom: 15%; left: 10%; animation-delay: 1s; }
        .mega-burger:nth-child(4) { bottom: 10%; right: 5%; animation-delay: 1.5s; }

        .corner-burgers {
            position: fixed;
            z-index: 5;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .grid-burgers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            padding: 20px;
            z-index: 0;
            opacity: 0.4;
        }

        .grid-burger {
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: shake 2s ease-in-out infinite;
        }

        .grid-burger:nth-child(odd) {
            animation-delay: 0.5s;
        }

        .floating-ingredients {
            position: fixed;
            z-index: 2;
            font-size: 3rem;
            animation: floatAround 8s ease-in-out infinite;
        }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -30px) rotate(90deg); }
            50% { transform: translate(0, -50px) rotate(180deg); }
            75% { transform: translate(-30px, -30px) rotate(270deg); }
        }

        .ingredient-1 { top: 20%; left: 15%; animation-delay: 0s; }
        .ingredient-2 { top: 30%; right: 20%; animation-delay: 1s; }
        .ingredient-3 { bottom: 25%; left: 20%; animation-delay: 2s; }
        .ingredient-4 { bottom: 35%; right: 15%; animation-delay: 3s; }
        .ingredient-5 { top: 60%; left: 8%; animation-delay: 4s; }
        .ingredient-6 { top: 15%; right: 30%; animation-delay: 5s; }

        @media (max-width: 768px) {
            .name {
                font-size: 2.5rem;
            }
            .name-card {
                padding: 30px 50px;
            }
            .mega-burger {
                font-size: 5rem;
            }
            .subtitle {
                font-size: 1rem;
            }
        }

        .sparkle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--cheese);
            border-radius: 50%;
            animation: sparkle 1.5s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- 背景网格汉堡 -->
    <div class="grid-burgers" id="gridBurgers"></div>

    <!-- 下落的汉堡雨 -->
    <div class="burger-rain" id="burgerRain"></div>

    <!-- 四角大汉堡 -->
    <div class="corner-burgers">
        <div class="mega-burger">🍔</div>
        <div class="mega-burger">🍔</div>
        <div class="mega-burger">🍔</div>
        <div class="mega-burger">🍔</div>
    </div>

    <!-- 漂浮的配料 -->
    <div class="floating-ingredients ingredient-1">🥬</div>
    <div class="floating-ingredients ingredient-2">🍅</div>
    <div class="floating-ingredients ingredient-3">🧀</div>
    <div class="floating-ingredients ingredient-4">🥓</div>
    <div class="floating-ingredients ingredient-5">🧅</div>
    <div class="floating-ingredients ingredient-6">🥒</div>

    <!-- 中心名片 -->
    <div class="center-content">
        <div class="name-card">
            <h1 class="name">蔡承翰</h1>
            <p class="subtitle">🍔 Burger Lover 🍔</p>
        </div>
    </div>

    <script>
        // 创建背景网格汉堡
        const gridContainer = document.getElementById('gridBurgers');
        const gridCount = 150;
        for (let i = 0; i < gridCount; i++) {
            const burger = document.createElement('div');
            burger.className = 'grid-burger';
            burger.textContent = '🍔';
            burger.style.animationDelay = `${Math.random() * 2}s`;
            gridContainer.appendChild(burger);
        }

        // 创建下落的汉堡雨
        const rainContainer = document.getElementById('burgerRain');
        
        function createFallingBurger() {
            const burger = document.createElement('div');
            burger.className = 'burger';
            burger.textContent = '🍔';
            burger.style.left = `${Math.random() * 100}%`;
            burger.style.fontSize = `${1.5 + Math.random() * 3}rem`;
            burger.style.animationDuration = `${3 + Math.random() * 4}s`;
            burger.style.animationDelay = `${Math.random() * 2}s`;
            rainContainer.appendChild(burger);

            // 动画结束后移除
            setTimeout(() => {
                burger.remove();
            }, 8000);
        }

        // 持续创建汉堡雨
        setInterval(createFallingBurger, 300);

        // 初始创建一批
        for (let i = 0; i < 20; i++) {
            setTimeout(createFallingBurger, i * 100);
        }

        // 创建闪光效果
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = `${Math.random() * 100}%`;
            sparkle.style.top = `${Math.random() * 100}%`;
            sparkle.style.animationDelay = `${Math.random()}s`;
            document.body.appendChild(sparkle);

            setTimeout(() => sparkle.remove(), 1500);
        }

        setInterval(createSparkle, 500);

        // 点击效果 - 生成汉堡爆炸
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 8; i++) {
                const burst = document.createElement('div');
                burst.textContent = '🍔';
                burst.style.cssText = `
                    position: fixed;
                    left: ${e.clientX}px;
                    top: ${e.clientY}px;
                    font-size: 2rem;
                    pointer-events: none;
                    z-index: 100;
                    animation: burst 1s ease-out forwards;
                `;
                
                const angle = (i / 8) * Math.PI * 2;
                const distance = 100 + Math.random() * 50;
                burst.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                burst.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                
                document.body.appendChild(burst);
                setTimeout(() => burst.remove(), 1000);
            }
        });

        // 添加爆炸动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes burst {
                0% {
                    transform: translate(-50%, -50%) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
